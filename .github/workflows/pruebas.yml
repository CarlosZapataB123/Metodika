# CI de Métodika: ejecuta la suite completa (motor metodológico,
# fórmulas estadísticas y utilidades) en cada push y pull request.
name: Pruebas

on: [push, pull_request]

jobs:
  suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Ejecutar suite
        run: |
          set -e
          for f in tests/*.mjs; do
            echo "── $f"
            node "$f"
          done
